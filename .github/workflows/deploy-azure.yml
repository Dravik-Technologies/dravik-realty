name: deploy azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_LOCATION: eastus
  POSTGRES_LOCATION: centralus
  POSTGRES_ADMIN_LOGIN: dravikadmin
  IMAGE_NAME: command-center

jobs:
  deploy-staging:
    name: deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    env:
      APP_ENVIRONMENT: staging
      RESOURCE_GROUP: dravik-realty-staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy core Azure resources
        id: core
        run: |
          outputs="$(az deployment group create \
            --name "core-${APP_ENVIRONMENT}-${GITHUB_RUN_NUMBER}" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/core.bicep \
            --parameters environmentName="$APP_ENVIRONMENT" location="$AZURE_LOCATION" postgresLocation="$POSTGRES_LOCATION" postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --query properties.outputs \
            -o json)"

          echo "acr_login_server=$(echo "$outputs" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(echo "$outputs" | jq -r '.acrName.value')" >> "$GITHUB_OUTPUT"
          echo "container_apps_environment_name=$(echo "$outputs" | jq -r '.containerAppsEnvironmentName.value')" >> "$GITHUB_OUTPUT"
          echo "managed_identity_name=$(echo "$outputs" | jq -r '.managedIdentityName.value')" >> "$GITHUB_OUTPUT"
          echo "postgres_host=$(echo "$outputs" | jq -r '.postgresHost.value')" >> "$GITHUB_OUTPUT"
          echo "postgres_server_name=$(echo "$outputs" | jq -r '.postgresServerName.value')" >> "$GITHUB_OUTPUT"

      - name: Prepare database URL
        id: database
        env:
          POSTGRES_HOST: ${{ steps.core.outputs.postgres_host }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          database_url="$(node -e 'const login = process.env.POSTGRES_ADMIN_LOGIN; const password = encodeURIComponent(process.env.POSTGRES_PASSWORD); const host = process.env.POSTGRES_HOST; if (!login || !password || !host) throw new Error("Missing Postgres connection input"); process.stdout.write(`postgresql://${encodeURIComponent(login)}:${password}@${host}:5432/dravik_control?sslmode=require`);')"
          echo "::add-mask::$database_url"
          echo "url=$database_url" >> "$GITHUB_OUTPUT"

      - name: Allow migration runner through Postgres firewall
        id: postgres_firewall
        env:
          POSTGRES_SERVER_NAME: ${{ steps.core.outputs.postgres_server_name }}
        run: |
          runner_ip="$(curl --fail --silent --show-error https://api.ipify.org)"
          rule_name="gha-${APP_ENVIRONMENT}-${GITHUB_RUN_ID}"
          az postgres flexible-server firewall-rule create \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --name "$rule_name" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip" \
            --output none
          echo "rule_name=$rule_name" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ steps.database.outputs.url }}
        run: pnpm --filter @dravik/database migrate

      - name: Verify database foundation
        env:
          DATABASE_URL: ${{ steps.database.outputs.url }}
        run: pnpm --filter @dravik/database migrate:check

      - name: Remove migration runner Postgres firewall rule
        if: always() && steps.postgres_firewall.outputs.rule_name != ''
        env:
          POSTGRES_SERVER_NAME: ${{ steps.core.outputs.postgres_server_name }}
          RULE_NAME: ${{ steps.postgres_firewall.outputs.rule_name }}
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --name "$RULE_NAME" \
            --yes \
            --output none || true

      - name: Build and push image
        id: image
        run: |
          image_tag="${GITHUB_SHA}"
          image_ref="${{ steps.core.outputs.acr_login_server }}/${IMAGE_NAME}:${image_tag}"

          az acr login --name "${{ steps.core.outputs.acr_name }}"
          docker build --pull --build-arg NEXT_PUBLIC_APP_ENV="$APP_ENVIRONMENT" --tag "$image_ref" .
          docker push "$image_ref"

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Deploy container app
        id: app
        run: |
          outputs="$(az deployment group create \
            --name "app-${APP_ENVIRONMENT}-${GITHUB_RUN_NUMBER}" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/app.bicep \
            --parameters \
              environmentName="$APP_ENVIRONMENT" \
              location="$AZURE_LOCATION" \
              acrName="${{ steps.core.outputs.acr_name }}" \
              containerAppsEnvironmentName="${{ steps.core.outputs.container_apps_environment_name }}" \
              managedIdentityName="${{ steps.core.outputs.managed_identity_name }}" \
              imageName="$IMAGE_NAME" \
              imageTag="${{ steps.image.outputs.image_tag }}" \
              authProvider="local" \
              databaseUrl="${{ steps.database.outputs.url }}" \
            --query properties.outputs \
            -o json)"

          echo "fqdn=$(echo "$outputs" | jq -r '.containerAppFqdn.value')" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: curl --fail --retry 6 --retry-delay 10 "https://${{ steps.app.outputs.fqdn }}/login"

  deploy-production:
    name: deploy production
    runs-on: ubuntu-latest
    needs: deploy-staging
    timeout-minutes: 45
    environment: production
    env:
      APP_ENVIRONMENT: prod
      RESOURCE_GROUP: dravik-realty
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify production auth secrets
        env:
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          ENTRA_ALLOWED_EMAILS: ${{ secrets.ENTRA_ALLOWED_EMAILS }}
          ENTRA_AUTHORITY: ${{ secrets.ENTRA_AUTHORITY }}
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
          ENTRA_COMMAND_REDIRECT_URI: ${{ secrets.ENTRA_COMMAND_REDIRECT_URI }}
          ENTRA_POST_LOGOUT_REDIRECT_URI: ${{ secrets.ENTRA_POST_LOGOUT_REDIRECT_URI }}
          ENTRA_PORTAL_ALLOWED_EMAILS: ${{ secrets.ENTRA_PORTAL_ALLOWED_EMAILS }}
          ENTRA_PORTAL_REDIRECT_URI: ${{ secrets.ENTRA_PORTAL_REDIRECT_URI }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
        run: |
          missing=()
          for key in AUTH_SESSION_SECRET ENTRA_ALLOWED_EMAILS ENTRA_CLIENT_ID ENTRA_CLIENT_SECRET ENTRA_COMMAND_REDIRECT_URI ENTRA_POST_LOGOUT_REDIRECT_URI ENTRA_PORTAL_ALLOWED_EMAILS ENTRA_PORTAL_REDIRECT_URI; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ -z "$ENTRA_AUTHORITY" ] && [ -z "$ENTRA_TENANT_ID" ]; then
            missing+=("ENTRA_AUTHORITY or ENTRA_TENANT_ID")
          fi

          if [ -n "$AUTH_SESSION_SECRET" ] && [ "${#AUTH_SESSION_SECRET}" -lt 32 ]; then
            missing+=("AUTH_SESSION_SECRET length >= 32")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing production auth configuration:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy core Azure resources
        id: core
        run: |
          outputs="$(az deployment group create \
            --name "core-${APP_ENVIRONMENT}-${GITHUB_RUN_NUMBER}" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/core.bicep \
            --parameters environmentName="$APP_ENVIRONMENT" location="$AZURE_LOCATION" postgresLocation="$POSTGRES_LOCATION" postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --query properties.outputs \
            -o json)"

          echo "acr_login_server=$(echo "$outputs" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(echo "$outputs" | jq -r '.acrName.value')" >> "$GITHUB_OUTPUT"
          echo "container_apps_environment_name=$(echo "$outputs" | jq -r '.containerAppsEnvironmentName.value')" >> "$GITHUB_OUTPUT"
          echo "managed_identity_name=$(echo "$outputs" | jq -r '.managedIdentityName.value')" >> "$GITHUB_OUTPUT"
          echo "postgres_host=$(echo "$outputs" | jq -r '.postgresHost.value')" >> "$GITHUB_OUTPUT"
          echo "postgres_server_name=$(echo "$outputs" | jq -r '.postgresServerName.value')" >> "$GITHUB_OUTPUT"

      - name: Prepare database URL
        id: database
        env:
          POSTGRES_HOST: ${{ steps.core.outputs.postgres_host }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          database_url="$(node -e 'const login = process.env.POSTGRES_ADMIN_LOGIN; const password = encodeURIComponent(process.env.POSTGRES_PASSWORD); const host = process.env.POSTGRES_HOST; if (!login || !password || !host) throw new Error("Missing Postgres connection input"); process.stdout.write(`postgresql://${encodeURIComponent(login)}:${password}@${host}:5432/dravik_control?sslmode=require`);')"
          echo "::add-mask::$database_url"
          echo "url=$database_url" >> "$GITHUB_OUTPUT"

      - name: Allow migration runner through Postgres firewall
        id: postgres_firewall
        env:
          POSTGRES_SERVER_NAME: ${{ steps.core.outputs.postgres_server_name }}
        run: |
          runner_ip="$(curl --fail --silent --show-error https://api.ipify.org)"
          rule_name="gha-${APP_ENVIRONMENT}-${GITHUB_RUN_ID}"
          az postgres flexible-server firewall-rule create \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --name "$rule_name" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip" \
            --output none
          echo "rule_name=$rule_name" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ steps.database.outputs.url }}
        run: pnpm --filter @dravik/database migrate

      - name: Verify database foundation
        env:
          DATABASE_URL: ${{ steps.database.outputs.url }}
        run: pnpm --filter @dravik/database migrate:check

      - name: Remove migration runner Postgres firewall rule
        if: always() && steps.postgres_firewall.outputs.rule_name != ''
        env:
          POSTGRES_SERVER_NAME: ${{ steps.core.outputs.postgres_server_name }}
          RULE_NAME: ${{ steps.postgres_firewall.outputs.rule_name }}
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --name "$RULE_NAME" \
            --yes \
            --output none || true

      - name: Build and push image
        id: image
        run: |
          image_tag="${GITHUB_SHA}"
          image_ref="${{ steps.core.outputs.acr_login_server }}/${IMAGE_NAME}:${image_tag}"

          az acr login --name "${{ steps.core.outputs.acr_name }}"
          docker build --pull --build-arg NEXT_PUBLIC_APP_ENV="$APP_ENVIRONMENT" --tag "$image_ref" .
          docker push "$image_ref"

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Deploy container app
        id: app
        run: |
          outputs="$(az deployment group create \
            --name "app-${APP_ENVIRONMENT}-${GITHUB_RUN_NUMBER}" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/app.bicep \
            --parameters \
              environmentName="$APP_ENVIRONMENT" \
              location="$AZURE_LOCATION" \
              acrName="${{ steps.core.outputs.acr_name }}" \
              containerAppsEnvironmentName="${{ steps.core.outputs.container_apps_environment_name }}" \
              managedIdentityName="${{ steps.core.outputs.managed_identity_name }}" \
              imageName="$IMAGE_NAME" \
              imageTag="${{ steps.image.outputs.image_tag }}" \
              authProvider="entra" \
              authSessionSecret="${{ secrets.AUTH_SESSION_SECRET }}" \
              entraAllowedEmails="${{ secrets.ENTRA_ALLOWED_EMAILS }}" \
              entraAuthority="${{ secrets.ENTRA_AUTHORITY }}" \
              entraBootstrapRole="${{ secrets.ENTRA_BOOTSTRAP_ROLE || 'broker_owner' }}" \
              entraClientId="${{ secrets.ENTRA_CLIENT_ID }}" \
              entraClientSecret="${{ secrets.ENTRA_CLIENT_SECRET }}" \
              entraCommandRedirectUri="${{ secrets.ENTRA_COMMAND_REDIRECT_URI }}" \
              entraPortalAllowedEmails="${{ secrets.ENTRA_PORTAL_ALLOWED_EMAILS }}" \
              entraPortalRedirectUri="${{ secrets.ENTRA_PORTAL_REDIRECT_URI }}" \
              entraPostLogoutRedirectUri="${{ secrets.ENTRA_POST_LOGOUT_REDIRECT_URI }}" \
              entraTenantId="${{ secrets.ENTRA_TENANT_ID }}" \
              databaseUrl="${{ steps.database.outputs.url }}" \
            --query properties.outputs \
            -o json)"

          echo "fqdn=$(echo "$outputs" | jq -r '.containerAppFqdn.value')" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: curl --fail --retry 6 --retry-delay 10 "https://${{ steps.app.outputs.fqdn }}/login"
